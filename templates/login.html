<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — Food Rescue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body class="auth-shell">
    <div class="auth-card">
        <h1>🌾 Food Rescue</h1>
        <p class="sub">Log in to donate, track inventory &amp; more</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="post" action="/login_validation">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>

            <button type="submit" class="btn btn-block" style="margin-top:20px;">Log in</button>
        </form>

        <p class="switch">Don't have an account? <a href="/signUp">Create one</a></p>
    </div>
</body>
</html>
